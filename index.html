<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Credit Card Should You Get? | Caleb Hammer</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --lime: #e1fd0c;
      --lime-text: #3a4f00;
      --lime-dim: #c8e20a;
      --green: #1a9e1a;
      --dark: #ffffff;
      --dark2: #f8f8f8;
      --dark3: #f2f2f2;
      --card-bg: #ffffff;
      --border: rgba(0,0,0,0.08);
      --border-light: rgba(0,0,0,0.11);
      --text: #111111;
      --muted: #666666;
      --white: #111111;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: #f5f5f5;
      background-attachment: fixed;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* Header */
    .header {
      width: 100%;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--lime);
    }
    .header-name {
      font-family: 'Inter Tight', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      color: #111111;
      letter-spacing: -0.02em;
    }
    .header-tag {
      font-size: 0.72rem;
      color: var(--lime-text);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Page wrapper */
    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    /* Hero */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 48px;
      gap: 24px;
    }
    .hero-photo {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--lime);
      box-shadow: 0 0 40px rgba(225,253,12,0.1);
      flex-shrink: 0;
    }
    .hero-copy {}
    .hero h1 {
      font-family: 'Inter Tight', sans-serif;
      font-weight: 900;
      font-size: 2.6rem;
      line-height: 1.05;
      letter-spacing: -0.04em;
      color: var(--white);
      margin-bottom: 14px;
    }
    .hero h1 span {
      color: var(--lime-text);
    }
    .hero p {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.65;
      max-width: 480px;
      margin: 0 auto;
    }

    @media (min-width: 600px) {
      .hero {
        flex-direction: row;
        text-align: left;
        align-items: center;
      }
      .hero p {
        margin: 0;
      }
    }

    /* Step indicators */
    .steps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 32px;
    }
    .step-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--dark3);
      border: 2px solid var(--border-light);
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter Tight', sans-serif;
      transition: all 0.25s ease;
      position: relative;
      z-index: 1;
    }
    .step-dot.active {
      background: var(--lime);
      border-color: var(--lime-text);
      color: #000;
      box-shadow: 0 0 16px rgba(225,253,12,0.4);
    }
    .step-dot.done {
      background: rgba(225,253,12,0.1);
      border-color: var(--lime-text);
      color: var(--lime-text);
    }
    .step-line {
      height: 2px;
      width: 32px;
      background: var(--border-light);
      transition: background 0.25s ease;
    }
    .step-line.done {
      background: var(--lime);
    }

    /* Quiz card */
    .quiz-card {
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 36px;
      overflow: hidden;
    }

    .q-slide {
      animation: slideIn 0.28s ease forwards;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .q-slide-back {
      animation: slideInBack 0.28s ease forwards;
    }
    @keyframes slideInBack {
      from { opacity: 0; transform: translateX(-24px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .q-number {
      font-size: 0.72rem;
      color: var(--lime-text);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .q-text {
      font-family: 'Inter Tight', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      line-height: 1.25;
      color: var(--white);
      margin-bottom: 28px;
      letter-spacing: -0.025em;
    }

    /* Options */
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 18px;
      background: var(--dark3);
      border: 1.5px solid var(--border-light);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      user-select: none;
    }
    .option:hover {
      border-color: var(--lime-text);
      background: rgba(225,253,12,0.05);
      transform: translateY(-1px);
    }
    .option:active {
      transform: translateY(0);
    }
    .option.selected {
      border-color: var(--lime-text);
      background: var(--lime);
    }
    .option-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--muted);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .option.selected .option-check {
      background: #000;
      border-color: #000;
    }
    .option.selected .option-check::after {
      content: '';
      width: 9px;
      height: 6px;
      border-left: 2.5px solid var(--lime);
      border-bottom: 2.5px solid var(--lime);
      transform: rotate(-45deg) translateY(-1px);
      display: block;
    }
    .option-label {
      font-size: 0.96rem;
      color: var(--text);
      line-height: 1.5;
      font-weight: 400;
    }
    .option.selected .option-label {
      color: #000;
      font-weight: 600;
    }

    /* Navigation */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 28px;
    }
    .btn-back {
      background: none;
      border: 1.5px solid var(--border-light);
      color: var(--muted);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-back:hover {
      border-color: var(--muted);
      color: var(--text);
    }
    .btn-next {
      background: var(--lime);
      border: none;
      color: #000;
      padding: 13px 30px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: 'Inter Tight', sans-serif;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .btn-next:hover {
      background: #c8e20a;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(225,253,12,0.3);
    }
    .btn-next:active {
      transform: translateY(0);
    }
    .btn-next:disabled {
      background: var(--border-light);
      color: var(--muted);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Result screen */
    .result-hero {
      text-align: center;
      margin-bottom: 36px;
    }
    .result-photo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid var(--lime);
      margin-bottom: 20px;
    }
    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(225,253,12,0.1);
      border: 1px solid rgba(225,253,12,0.35);
      color: var(--lime-text);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 99px;
      margin-bottom: 20px;
    }
    .result-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--lime);
      flex-shrink: 0;
    }
    .result-card-name {
      font-family: 'Inter Tight', sans-serif;
      font-weight: 900;
      font-size: 2.4rem;
      line-height: 1.05;
      letter-spacing: -0.04em;
      color: var(--white);
      margin-bottom: 8px;
    }
    .result-card-type {
      font-size: 0.9rem;
      color: var(--lime-text);
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* Caleb's take */
    .caleb-take {
      background: rgba(225,253,12,0.05);
      border: 1px solid rgba(225,253,12,0.1);
      border-radius: 16px;
      padding: 22px 24px;
      margin-bottom: 20px;
    }
    .caleb-take-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .caleb-take-header img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid var(--lime);
    }
    .caleb-take-name {
      font-family: 'Inter Tight', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--lime-text);
      letter-spacing: 0.02em;
    }
    .caleb-take p {
      font-size: 0.94rem;
      color: #444444;
      line-height: 1.7;
    }

    /* Info cards */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
    @media (min-width: 580px) {
      .info-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    .info-card {
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 22px;
    }
    .info-card h3 {
      font-family: 'Inter Tight', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--lime-text);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
    }
    .info-card ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .info-card ul li {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.55;
      padding-left: 18px;
      position: relative;
    }
    .info-card ul li::before {
      content: '+';
      color: var(--lime-text);
      position: absolute;
      left: 0;
      font-weight: 800;
      font-size: 0.85rem;
    }

    /* Restart */
    .btn-restart {
      display: block;
      width: 100%;
      background: var(--dark3);
      border: 1.5px solid var(--border-light);
      color: var(--muted);
      padding: 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      text-align: center;
    }
    .btn-restart:hover {
      border-color: var(--muted);
      color: var(--text);
    }

    /* Trust pills */
    .trust-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .trust-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #e1fd0c;
      border: 1px solid #c8e20a;
      color: #1a2600;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 99px;
      letter-spacing: 0.02em;
    }
    .trust-pill::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1a2600;
      flex-shrink: 0;
    }
    @media (min-width: 600px) {
      .trust-pills { justify-content: flex-start; }
    }
    @media (max-width: 599px) {
      .trust-pills { justify-content: center; }
    }


    .progress-wrap {
      height: 4px;
      background: var(--border-light);
      border-radius: 99px;
      margin-bottom: 32px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--lime);
      border-radius: 99px;
      transition: width 0.35s ease;
      min-width: 8%;
    }
    .hidden { display: none !important; }

    @media (max-width: 480px) {
      .page { padding: 32px 16px 60px; }
      .hero h1 { font-size: 2rem; }
      .quiz-card { padding: 24px 18px; }
      .q-text { font-size: 1.2rem; }
      .result-card-name { font-size: 1.9rem; }
      .step-line { width: 20px; }
    }
  </style>
</head>
<body>

<header class="header">
  <img src="caleb.jpg" alt="Caleb Hammer" />
  <div>
    <div class="header-name">Caleb Hammer</div>
    <div class="header-tag">Financial Audit</div>
  </div>
</header>

<div class="page">

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen">
    <div class="hero">
      <img src="caleb.jpg" alt="Caleb Hammer" class="hero-photo" />
      <div class="hero-copy">
        <h1>Find Your <span>Perfect</span> Credit Card</h1>
        <p>Six questions. No fluff. Get a card recommendation based on your actual financial situation.</p>
        <div class="trust-pills">
          <span class="trust-pill">No email required</span>
          <span class="trust-pill">No sign-up</span>
          <span class="trust-pill">Results in 60 seconds</span>
        </div>
      </div>
    </div>

    <div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>

    <div class="quiz-card">

      <img src="caleb.jpg" alt="Caleb Hammer" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2.5px solid var(--lime);margin-bottom:24px;display:block;margin-left:auto;margin-right:auto;" />
      <div style="font-family:'Inter Tight',sans-serif;font-weight:800;font-size:1.6rem;color:var(--white);letter-spacing:-0.03em;margin-bottom:10px;">Finding your card...</div>
      <div style="font-size:0.92rem;color:var(--muted);">Taking you to your recommendation now.</div>
    </div>
  </div>

</div>

  // Redirect URLs for each outcome (5 total)
  const REDIRECT_URLS = {

  // Map old card keys → 5 outcome buckets
  const OUTCOME_MAP = {

  // SubID from URL slug (e.g. /yt → s1=yt); ignore file extensions
  const _rawSlug = window.location.pathname.replace(/^\//, '').split('/')[0];
  const _slug = _rawSlug && !/\.\w+$/.test(_rawSlug) ? _rawSlug : '';

  const questions = [
    {

  const cards = {

      reasons: [

      name: 'Chase Sapphire Preferred',

      take: "The Sapphire Preferred is the best entry-level travel card on the market right now. The welcome bonus alone usually covers the annual fee for two to three years. Five points per dollar on travel booked through Chase, three on dining, and solid transfer partners mean your points actually go somewhere. Pay it in full. Every month. No exceptions.",

      name: 'Chase Sapphire Reserve',

      take: "The Reserve is a serious card for people who travel seriously. The $550 annual fee sounds scary until you account for the $300 travel credit, Priority Pass lounge access, and 10x points on Chase Travel purchases. If you fly multiple times a year and you value comfort, this card pays for itself. If you are not hitting at least $550 in annual value, get the Preferred instead.",

        '$300 annual travel credit applied automatically against travel purchases',

  };

  function getCard(a) {
    if (a.cardtype === 'business' && a.score !== 'poor' && a.score !== 'new') return 'business';
    if (a.payoff === 'carry') return 'transfer';
    if (a.score === 'poor' || a.score === 'new') return 'fizz';
    if (a.goal === 'build') return 'secured';

    const scores = {
      secured: 0, student: 0, transfer: 0, fizz: 0,
      cashback: 0, cashback_cat: 0, travel: 0, premium: 0
    };

    if (a.score === 'new')       { scores.secured += 4; scores.fizz += 2; }
    if (a.score === 'excellent') { scores.premium += 3; scores.travel += 1; scores.cashback += 1; }
    if (a.score === 'good')      { scores.cashback += 2; scores.cashback_cat += 2; scores.travel += 1; }
    if (a.score === 'fair')      { scores.secured += 3; scores.fizz += 1; }
    if (a.score === 'poor')      { scores.fizz += 4; scores.secured += 1; }

    if (a.payoff === 'yes')       { scores.travel += 2; scores.premium += 2; scores.cashback += 2; scores.cashback_cat += 1; }
    if (a.payoff === 'sometimes') { scores.cashback += 2; scores.cashback_cat += 1; }

    if (a.goal === 'travel')   { scores.travel += 3; scores.premium += 1; }
    if (a.goal === 'cashback') { scores.cashback += 3; scores.cashback_cat += 2; }

    if (a.spending === 'travel')     { scores.travel += 3; scores.premium += 2; }
    if (a.spending === 'everyday')   { scores.cashback_cat += 3; scores.cashback += 2; }
    if (a.spending === 'everything') { scores.cashback += 3; }
    if (a.spending === 'bills')      { scores.cashback += 1; }

    if (a.fee === 'premium-yes')  { scores.premium += 4; scores.travel += 1; }
    if (a.fee === 'cashback-yes') { scores.cashback += 2; scores.cashback_cat += 1; }
    if (a.fee === 'no')           { scores.cashback += 2; scores.cashback_cat += 1; scores.premium -= 2; scores.travel -= 1; }

    Object.keys(scores).forEach(k => { if (scores[k] < 0) scores[k] = 0; });
    return Object.keys(scores).reduce((a, b) => scores[a] >= scores[b] ? a : b);
  }

  let current = 0;
  let answers = {};
  let selected = null;
  let autoAdvanceTimer = null;

  function updateProgress() {
    const pct = Math.round((current / (questions.length - 1)) * 100);
    const fill = document.getElementById('progress-fill');
    if (fill) fill.style.width = Math.max(8, pct) + '%';
  }

  function render(dir) {
    const q = questions[current];
    selected = answers[q.id] || null;
    updateProgress();

    const inner = document.getElementById('q-inner');
    inner.className = dir === 'back' ? 'q-slide-back' : 'q-slide';
    void inner.offsetWidth;

    document.getElementById('q-text').textContent = q.text;

    const optionsEl = document.getElementById('q-options');
    optionsEl.innerHTML = '';
    q.options.forEach(opt => {
      const div = document.createElement('div');
      div.className = 'option' + (selected === opt.value ? ' selected' : '');
      div.innerHTML = `<div class="option-check"></div><div class="option-label">${opt.label}</div>`;
      div.addEventListener('click', () => selectOption(opt.value));
      optionsEl.appendChild(div);
    });

    const backBtn = document.getElementById('btn-back');
    if (backBtn) backBtn.style.visibility = current === 0 ? 'hidden' : 'visible';
  }

  function selectOption(value) {
    if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
    selected = value;
    answers[questions[current].id] = value;
    document.querySelectorAll('.option').forEach((el, i) => {
      el.classList.toggle('selected', questions[current].options[i].value === value);
    });
    autoAdvanceTimer = setTimeout(() => { autoAdvanceTimer = null; nextQ(); }, 380);
  }

  function nextQ() {
    if (!selected) return;
    answers[questions[current].id] = selected;
    const id = questions[current].id;

    // Business: skip payoff, jump to score
    if (id === 'cardtype' && selected === 'business') {
      current = questions.findIndex(q => q.id === 'score');
      render('forward'); return;
    }
    // Business: after score → done
    if (answers.cardtype === 'business' && id === 'score') {
      showResult(); return;
    }
    // Carry balance → always balance transfer
    if (id === 'payoff' && selected === 'carry') {
      showResult(); return;
    }
    // Poor or new to credit → always builder
    if (id === 'score' && (selected === 'poor' || selected === 'new')) {
      showResult(); return;
    }
    // Goal = build → builder
    if (id === 'goal' && selected === 'build') {
      showResult(); return;
    }

    if (current < questions.length - 1) {
      current++;
      render('forward');
    } else {
      showResult();
    }
  }

  function prevQ() {
    if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
    if (current > 0) {
      if (answers.cardtype === 'business' && questions[current].id === 'score') {
        current = questions.findIndex(q => q.id === 'cardtype');
      } else {
        current--;
      }
      render('back');
    }
  }

  function showResult() {
    const cardKey = getCard(answers);
    const outcome = OUTCOME_MAP[cardKey] || 'everyday';
    const baseUrl = REDIRECT_URLS[outcome];
    const url = _slug ? baseUrl + '&s1=' + encodeURIComponent(_slug) : baseUrl;

    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });

    window.location.href = url;
  }

  function restart() {
    if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
    current = 0;
    answers = {};
    selected = null;
    document.getElementById('result-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    render('forward');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  render('forward');
</script>
